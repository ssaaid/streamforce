services:
  - type: web
    name: streamforce
    runtime: node
    rootDir: streamforce/backend
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: streamforce-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
